backend:
  name: git-gateway
  branch: main

media_folder: "bilder/uploads"
public_folder: "/bilder/uploads"

collections:
  - name: "inhalt"
    label: "Website-Inhalt"
    files:
      - name: "seite"
        label: "Seiteninhalt (inhalt.json)"
        file: "inhalt.json"
        fields:
          - { label: "Meta-Titel (Browser-Tab)", name: "metaTitle", widget: "string" }
          - { label: "Meta-Beschreibung", name: "metaDesc", widget: "text" }
          - { label: "Seitentitel (z. B. Künstlername)", name: "titel", widget: "string" }
          - { label: "Hero Headline", name: "heroHeadline", widget: "string" }
          - { label: "Hero Subline", name: "heroSubline", widget: "text" }
          - { label: "Hero Bild (URL)", name: "heroBild", widget: "image" }
          - { label: "Logo (Bild-Upload)", name: "logoBild", widget: "image" }
          - { label: "Biografie Titel", name: "biografieTitel", widget: "string" }
          - { label: "Biografie Text (Markdown)", name: "biografieText", widget: "markdown" }
          - { label: "Künstlerfoto", name: "kuenstlerFoto", widget: "image" }

          - label: "Kontakt"
            name: "kontakt"
            widget: "object"
            fields:
              - { label: "Telefon", name: "telefon", widget: "string" }
              - { label: "E-Mail", name: "email", widget: "string" }
              - { label: "Chat-Button Text", name: "chatText", widget: "string" }
              - { label: "WhatsApp-Link", name: "chatLink", widget: "string" }
              - { label: "Instagram-Link", name: "socialInsta", widget: "string" }
              - { label: "LinkedIn-Link", name: "socialLink", widget: "string" }
              - { label: "Tawk.to ID (optional)", name: "tawkId", widget: "string" }

          - label: "Galeriebilder"
            name: "galerieBilder"
            widget: "list"
            summary: "{{fields.titel}}"
            fields:
              - { label: "Bild (Upload)", name: "bild", widget: "image" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Beschreibung", name: "beschreibung", widget: "text" }

          - label: "Impressum"
            name: "impressum"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Straße + Hausnummer", name: "strasse", widget: "string" }
              - { label: "PLZ + Ort", name: "ort", widget: "string" }
              - { label: "E-Mail", name: "email", widget: "string" }
              - { label: "Telefon", name: "telefon", widget: "string" }
              - { label: "Steuernummer", name: "steuer", widget: "string" }
              - { label: "Datenschutztext (Markdown)", name: "privacy", widget: "markdown" }

          - { label: "Untertitel (optional)", name: "untertitel", widget: "string" }
