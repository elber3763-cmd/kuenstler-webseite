backend:
  name: git-gateway
  branch: main

media_folder: "bilder/uploads"
public_folder: "bilder/uploads"

collections:
  - name: "einstellungen"
    label: "Webseite bearbeiten"
    files:
      - file: "inhalt.json"
        label: "Inhalte & Texte"
        name: "home"
        format: "json"
        fields:
          # --- SEO ---
          - {label: "Browser Titel (SEO)", name: "metaTitle", widget: "string", default: "Nico Art Studio"}
          - {label: "Seitenbeschreibung", name: "metaDesc", widget: "text", required: false}
          
          # --- Header ---
          - {label: "Künstler Name (Text)", name: "titel", widget: "string"}
          - {label: "Logo Bild", name: "logoBild", widget: "image", required: false}
          - {label: "Untertitel", name: "untertitel", widget: "string", required: false}
          
          # --- Hero ---
          - {label: "Hero Überschrift", name: "heroHeadline", widget: "string"}
          - {label: "Hero Untertitel", name: "heroSubline", widget: "string"}
          - {label: "Hintergrundbild", name: "heroBild", widget: "image"}
          
          # --- Über mich ---
          - {label: "Biografie Titel", name: "biografieTitel", widget: "string"}
          - {label: "Biografie Text", name: "biografieText", widget: "text"}
          - {label: "Künstler Foto", name: "kuenstlerFoto", widget: "image"}
          
          # --- Kontakt ---
          - label: "Kontakt Infos"
            name: "kontakt"
            widget: "object"
            fields:
              - {label: "Telefon", name: "telefon", widget: "string"}
              - {label: "E-Mail", name: "email", widget: "string"}
              - {label: "Chat Button Text", name: "chatText", widget: "string"}
              - {label: "WhatsApp Link", name: "chatLink", widget: "string", required: false}
              - {label: "Tawk.to Chat ID", name: "tawkId", widget: "string", required: false}
              - {label: "Instagram Link", name: "socialInsta", widget: "string", required: false}
              - {label: "LinkedIn Link", name: "socialLink", widget: "string", required: false}

          # --- Galerie ---
          - label: "Galerie"
            name: "galerieBilder"
            widget: "list"
            fields:
              - {label: "Titel", name: "titel", widget: "string"}
              - {label: "Beschreibung", name: "beschreibung", widget: "string"}
              - {label: "Bild", name: "bild", widget: "image"}

          # --- News ---
          - label: "News & Ausstellungen"
            name: "newsEintraege"
            widget: "list"
            required: false
            fields:
              - {label: "Überschrift", name: "headline", widget: "string"}
              - {label: "Datum", name: "datum", widget: "string"}
              - {label: "Kurztext", name: "text", widget: "text"}
              - {label: "Bild", name: "bild", widget: "image"}

          # --- NEU: IMPRESSUM ---
          - label: "Rechtliches / Impressum"
            name: "impressum"
            widget: "object"
            fields:
              - {label: "Firmenname / Inhaber", name: "name", widget: "string", default: "Nico Art"}
              - {label: "Straße & Hausnummer", name: "strasse", widget: "string"}
              - {label: "PLZ & Ort", name: "ort", widget: "string"}
              - {label: "E-Mail (Impressum)", name: "email", widget: "string"}
              - {label: "Telefon (Impressum)", name: "telefon", widget: "string"}
              - {label: "Steuernummer / USt-ID", name: "steuer", widget: "string", required: false}
              - {label: "Haftungsausschluss Text", name: "disclaimer", widget: "markdown", required: false}
              - {label: "Datenschutz Text (DSGVO)", name: "privacy", widget: "markdown", required: false}


