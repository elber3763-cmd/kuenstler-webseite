<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vielen Dank | Thomas Müller</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0078D4',
                        secondary: '#666666',
                        dark: '#1a1a1a',
                        light: '#f3f4f6',
                        accent: '#F97316',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-light overflow-x-hidden antialiased">

    <div class="min-h-screen flex items-center justify-center px-6">
        <div class="max-w-2xl w-full text-center">
            <div class="w-32 h-32 mx-auto mb-8 bg-green-500/10 rounded-full flex items-center justify-center border-4 border-green-500/20 shadow-[0_0_40px_rgba(34,197,94,0.3)] animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            
            <h1 class="font-serif text-5xl md:text-6xl text-white mb-6 leading-tight">Vielen Dank!</h1>
            
            <p class="text-xl text-gray-400 mb-8 leading-relaxed">
                Ihre Nachricht wurde erfolgreich übermittelt.<br>
                Wir melden uns in Kürze bei Ihnen.
            </p>
            
            <div class="w-32 h-1 bg-primary mx-auto rounded-full mb-10"></div>
            
            <a href="/" class="inline-block px-10 py-4 bg-primary text-white font-bold rounded-full shadow-[0_0_20px_rgba(0,120,212,0.5)] hover:shadow-[0_0_40px_rgba(0,120,212,0.8)] hover:scale-105 hover:bg-white hover:text-primary transition-all duration-300 transform uppercase tracking-wider">
                Zurück zur Startseite
            </a>
            
            <p class="text-sm text-gray-600 mt-12">
                Sie werden in <span id="countdown" class="text-primary font-bold">10</span> Sekunden automatisch weitergeleitet.
            </p>
        </div>
    </div>

    <script>
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            if (countdownEl) countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/';
            }
        }, 1000);
    </script>

</body>
</html>
